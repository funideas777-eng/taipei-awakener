<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="description" content="台北覺醒者 RPG - 以台灣六都為背景的獨自升級風格像素RPG網頁遊戲">
    <title>台北覺醒者 - Taipei Awakener RPG</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Preconnect to CDN -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
</head>
<body>
    <div id="game-container"></div>
    <!-- Name Input Modal for Leaderboard -->
    <div id="name-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:9999; justify-content:center; align-items:center;">
        <div style="background:#0a0a1e; border:2px solid #00d4ff; border-radius:12px; padding:24px; max-width:360px; width:90%; text-align:center; font-family:monospace;">
            <div style="color:#f1c40f; font-size:18px; margin-bottom:8px;">🏆 恭喜過關！</div>
            <div style="color:#ccc; font-size:14px; margin-bottom:16px;">輸入你的名字登錄全球排行榜</div>
            <input id="player-name-input" type="text" maxlength="12" placeholder="輸入名字（最多12字）"
                style="width:100%; padding:10px; font-size:16px; font-family:monospace; background:#1a1a2e; color:#fff; border:1px solid #3498db; border-radius:6px; text-align:center; box-sizing:border-box; outline:none;">
            <div style="margin-top:16px; display:flex; gap:10px; justify-content:center;">
                <button id="name-submit-btn" style="padding:8px 24px; font-size:15px; font-family:monospace; background:#1a3a1a; color:#2ecc71; border:1px solid #2ecc71; border-radius:6px; cursor:pointer;">提交</button>
                <button id="name-skip-btn" style="padding:8px 24px; font-size:15px; font-family:monospace; background:#2c1a1a; color:#e74c3c; border:1px solid #553333; border-radius:6px; cursor:pointer;">跳過</button>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <script type="module" src="js/main.js"></script>
</body>
</html>
